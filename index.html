    uplRisk.slice(0,8).map(x=>`${x.name} — ${fmt1(x._v)}d TAT on ${fmt(x.n)} uploads — slowest quartile.`),
    uplGood.slice(0,8).map(x=>`${x.name} — ${fmt1(x._v)}d TAT on ${fmt(x.n)} uploads — fastest quartile.`))}

  <div class="sectionhead"><span class="eyebrow">7 · RO Performance</span><h2>Volume, growth &amp; settlement</h2><div class="rule"></div></div>
  ${insightBlock("RO performance","",
    [`${fmt(roRows.length)} active ROs. ${roDeclining.length?fmt(roDeclining.length)+" RO(s) show 30%+ volume drop.":"No RO shows a sharp volume drop."}`,
     topSetRO.length&&topSetRO[0].settle?`Top-settling RO: <b>${topSetRO[0].name}</b> avg ${money(topSetRO[0].settle)} per case.`:""],
    [...roAgeRanked.filter(x=>x._flag==="risk").sort((a,b)=>b._v-a._v).slice(0,6).map(x=>`${x.name} (${x.insurer}) — ${fmt1(x.age)}d avg OS age, ${fmt(x.os)} open — oldest-aging quartile.`),
     ...roDeclining.slice(0,6).map(x=>`${x.name} (${x.insurer}) — ${fmt(x.mtd)} this period vs ${fmt(x.prev)} last (${pct(x.prev?x.mtd/x.prev-1:null)} change).`)],
    roVolRanked.filter(x=>x._flag==="good").slice(0,6).map(x=>`${x.name} (${x.insurer}) — ${fmt(x.mtd)} intimations, top quartile${x.tgt?`, ${pct(x.com)} of target`:""}.`))}

  <div class="sectionhead"><span class="eyebrow">8 · Hub Performance</span><h2>Volume, growth &amp; aging</h2><div class="rule"></div></div>
  ${insightBlock("Hub performance","",
    [`${fmt(hubRowsArr.length)} active hubs. ${hubDeclining.length?fmt(hubDeclining.length)+" hub(s) show 30%+ volume drop.":"No hub shows a sharp volume drop."}`,
     hubRowsArr.some(x=>x.city)?`Hubs across <b>${new Set(hubRowsArr.map(x=>x.city).filter(Boolean)).size}</b> distinct districts/cities.`:""],
    [...hubAgeRanked.filter(x=>x._flag==="risk").sort((a,b)=>b._v-a._v).slice(0,6).map(x=>`${x.name} (${x.insurer}) — ${fmt1(x.age)}d avg OS age, ${fmt(x.os)} open — oldest-aging quartile.`),
     ...hubDeclining.slice(0,6).map(x=>`${x.name} — ${fmt(x.mtd)} this period vs ${fmt(x.prev)} last (${pct(x.prev?x.mtd/x.prev-1:null)} change).`)],
    hubVolRanked.filter(x=>x._flag==="good").slice(0,6).map(x=>`${x.name} (${x.insurer}) — ${fmt(x.mtd)} intimations, top quartile.`))}

  <div class="sectionhead"><span class="eyebrow">9 · District</span><h2>Granular density &amp; outstanding concentration</h2><div class="rule"></div></div>
  ${insightBlock(`District-wise intimation — ${fmt(districtIntim.length)} active districts`,"",
    [districtIntim.length?`Top districts: ${districtIntim.slice(0,5).map(x=>`<b>${x.name}</b> ${fmt(x.n)}`).join(", ")}.`:"",
     districtOS.length?`Highest OS concentration: ${districtOS.slice(0,5).map(x=>`<b>${x.name}</b> ${fmt(x.n)} OS (avg ${fmt1(x.age)}d)`).join(", ")}.`:"",
     zeroDistrictRows?`${fmt(zeroDistrictRows)} case(s) have no District mapped on their Hub record.`:""],
    districtRanked.filter(x=>x._flag==="risk").sort((a,b)=>a._v-b._v).slice(0,8).map(x=>`${x.name} — ${fmt(x._v)} intimations, bottom quartile (low penetration).`),
    districtRanked.filter(x=>x._flag==="good").sort((a,b)=>b._v-a._v).slice(0,8).map(x=>`${x.name} — ${fmt(x._v)} intimations, top quartile (high penetration).`))}

  <div class="footnote" style="margin:6px 22px 18px">
    <b>Methodology:</b> Each metric benchmarks against peer group quartiles for the current filtered scope. Thresholds: 5 submissions (assessors/CCEs), 3 uploads (uploaders). "Declining" = 30%+ month-on-month volume drop. All 9 sections respond to the Zone/Insurer/Vehicle Type/Segment filters above.
  </div>
  `;
  $("#ins_zone_holder").innerHTML=mselHTML("ins_zone","Zone",zoneOpts,fi.zone);
  wireMsel("ins_zone",vals=>{state.insightsFilter.zone=vals;renderInsights();});
  $("#ins_insurer_holder").innerHTML=mselHTML("ins_insurer","Insurer",insurerOpts,fi.insurer);
  wireMsel("ins_insurer",vals=>{state.insightsFilter.insurer=vals;renderInsights();});
  $("#ins_vtype_holder").innerHTML=mselHTML("ins_vtype","Vehicle Type",vtypeOpts,fi.vtype);
  wireMsel("ins_vtype",vals=>{state.insightsFilter.vtype=vals;renderInsights();});
  $("#ins_segment_holder").innerHTML=mselHTML("ins_segment","Segment",segOpts,fi.segment);
  wireMsel("ins_segment",vals=>{state.insightsFilter.segment=vals;renderInsights();});
  $("#ins_reset").onclick=()=>{state.insightsFilter={zone:[],insurer:[],vtype:[],segment:[]};renderInsights();};
}



const state={asOf:null,activeN:1,fyMode:false,fy:null,flt:{insurer:[],zone:[],segment:[],vtype:[]},osElapsed:5,subAFilter:{tl:[],zone:[]},assFilter:{tl:[],zone:[],segment:[]},cceFilter:{tl:[],zone:[]},perfFilter:{insurer:[],ro:[],hub:[]},perfRange:6,densityFilter:{insurer:[],vtype:[],segment:[]},densityM1:null,densityM2:null,densityD1:[],densityD2:[],insightsFilter:{zone:[],insurer:[],vtype:[],segment:[]}};
const RENDER={intimation:renderIntimation,submission:renderSubmission,outstanding:renderOutstanding,assessor:renderAssessor,cce:renderCCE,upload:renderUpload,hub:renderHub,ro:renderRO,perf:renderPerf,density:renderDensity,insights:renderInsights};
let current="intimation";
function renderCurrent(){clearCharts();try{RENDER[current]();}catch(e){console.error(e);toast("Render error: "+e.message);}updateScope();}
function updateScope(){const P=computePeriod();$("#scopeNote").innerHTML=`Scope: <b>${P.scope}</b>`;}
function switchTab(t){current=t;$$("nav.tabs button").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));$$(".page").forEach(p=>p.classList.remove("active"));$("#page-"+t).classList.add("active");
  $("#filterbar").style.display=(["assessor","cce","upload","perf","density","insights"].includes(t))?"none":"flex";renderCurrent();}
$$("nav.tabs button").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
function fillFilters(){
  const defs=[
    {k:"insurer",label:"Insurer",vals:[...new Set(DB.rows.map(r=>r.insurer).filter(Boolean))].sort()},
    {k:"zone",label:"Zone",vals:[...new Set(DB.rows.map(r=>r.zone).filter(Boolean))].sort()},
    {k:"segment",label:"Segment",vals:["Retail","PB","Tie-up"].filter(s=>DB.rows.some(r=>r.segment===s))},
    {k:"vtype",label:"Vehicle Type",vals:[...new Set(DB.rows.map(r=>r.vtype).filter(v=>v&&v!=="—"))].sort()}
  ];
  defs.forEach(d=>{
    $("#flt_"+d.k+"_holder").innerHTML=mselHTML("flt_"+d.k,d.label,d.vals,state.flt[d.k]);
    wireMsel("flt_"+d.k,vals=>{state.flt[d.k]=vals;$("#flt_"+d.k+"_btn .lbl").textContent=vals.length===0?"All":(vals.length===1?vals[0]:vals.length+" selected");$("#flt_"+d.k+"_btn").classList.toggle("active",vals.length>0);renderCurrent();});
  });
}
$("#fltReset").onclick=()=>{state.flt={insurer:[],zone:[],segment:[],vtype:[]};fillFilters();renderCurrent();};
$("#activeN").onchange=()=>{state.activeN=+$("#activeN").value;if(current==="intimation")renderCurrent();};
$("#asOf").onchange=()=>{const d=parseDate($("#asOf").value);if(d){state.asOf=d;syncMonthSel();renderCurrent();}};
$("#monthSel").onchange=()=>{const mk=+$("#monthSel").value;const y=Math.floor(mk/12),mo=mk%12;const last=new Date(y,mo+1,0);const end=(DB.maxDate<last&&DB.maxDate>=new Date(y,mo,1))?DB.maxDate:last;state.asOf=end;$("#asOf").value=dayKey(end);renderCurrent();};
function syncMonthSel(){$("#monthSel").value=monKey(state.asOf);}
$("#fySwitch").onclick=()=>{state.fyMode=!state.fyMode;$("#fySwitch").classList.toggle("on",state.fyMode);$("#fySel").style.display=state.fyMode?"":"none";$("#monthCtrl").style.opacity=state.fyMode?.5:1;renderCurrent();};
$("#fySel").onchange=()=>{state.fy=+$("#fySel").value;renderCurrent();};

const GITHUB_EXCEL_URL="https://raw.githubusercontent.com/AravindhanC-24/Xclaims_Dashboard/main/Xclaims%20Base.xlsx";

function processWorkbook(arrayBuffer,sourceName){
  try{const wb=XLSX.read(new Uint8Array(arrayBuffer),{type:"array",cellDates:true});DB=buildModel(wb);
    state.asOf=new Date(DB.maxDate);state.fy=DB.fys.length?DB.fys[DB.fys.length-1]:fyStartYear(DB.maxDate);
    $("#asOf").value=dayKey(state.asOf);$("#asOf").max=dayKey(DB.maxDate);
    $("#activeN").innerHTML=Array.from({length:10},(_,i)=>`<option>${i+1}</option>`).join("");
    $("#monthSel").innerHTML=DB.months.map(mk=>`<option value="${mk}">${mLabel(new Date(Math.floor(mk/12),mk%12,1))}</option>`).join("");
    syncMonthSel();
    $("#fySel").innerHTML=DB.fys.map(y=>`<option value="${y}" ${y===state.fy?"selected":""}>${fyLabel(y)}</option>`).join("");
    $("#fileName").textContent=sourceName+" · "+fmt(DB.rows.length)+" rows";
    ["#fyCtrl","#monthCtrl","#dateCtrl","#activeCtrl"].forEach(s=>$(s).style.display="flex");
    $("#tabs").style.display="flex";$("#filterbar").style.display="flex";$("#landing").style.display="none";
    fillFilters();
    const nA=Object.keys(DB.aMeta).length,nC=Object.keys(DB.cMeta).length;
    toast("Loaded "+fmt(DB.rows.length)+" cases · "+nA+" assessors · "+nC+" CCEs");
    switchTab("intimation");
  }catch(err){console.error(err);$("#loadMsg").innerHTML='<span class="miss">Could not read file: '+err.message+'</span>';toast("Error: "+err.message);}}

function loadFile(file){$("#loadMsg").textContent="Reading "+file.name+" …";const fr=new FileReader();
  fr.onload=e=>{processWorkbook(e.target.result,file.name);};
  fr.readAsArrayBuffer(file);}

async function autoLoadFromGitHub(){
  $("#loadMsg").textContent="";
  try{
    const res=await fetch(GITHUB_EXCEL_URL+"?t="+Date.now());
    if(!res.ok)throw new Error("Could not fetch file ("+res.status+")");
    const buf=await res.arrayBuffer();
    processWorkbook(buf,"Xclaims Base.xlsx");
  }catch(err){
    console.error(err);
    // reveal the manual-upload fallback UI since auto-load failed
    $("#loadSpinner").style.display="none";
    $("#loadingTitle").textContent="Drop in your monthly workbook";
    $("#loadingHint").innerHTML='Reads <code>Base</code> (A:CS), <code>Hub</code> (A:L — target in K, Approved/Unapproved in L), <code>Upl. Base</code>, <code>Assessor</code> &amp; <code>CCE</code> (Zone · TL · Name · TGT), and an optional <code>Targets</code> sheet. Uses your derived columns (Insurer BX, Class BY, Segment BZ, Zone CA, Status CB) and recomputes every TAT, aging &amp; SLA itself.';
    $("#drop").style.display="block";
    $("#loadMsg").innerHTML='<span class="miss">Auto-load failed: '+err.message+'. Please upload manually below.</span>';
    toast("Auto-load failed — upload manually");
  }}

["#uploadBtn","#uploadBtn2"].forEach(s=>$(s).onclick=()=>$("#file").click());
$("#file").onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0]);};
const drop=$("#drop");["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("hot");}));
["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("hot");}));
drop.addEventListener("drop",e=>{if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});

// Auto-load on page open
autoLoadFromGitHub();
</script>
