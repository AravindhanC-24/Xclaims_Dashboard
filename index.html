<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claims Intelligence — Xclaim</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-array@3"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-geo@3"></script>
<style>
  :root{
    --bg:#f4f6fc; --bg2:#eceffb; --card:#ffffff; --line:#e4e8f4; --line2:#eef1fa;
    --ink:#1f2540; --ink-soft:#454d6e; --muted:#737c9e; --faint:#a3abc7;
    --p1:#5b5bd6; --p1s:#ebebfb;   /* indigo */
    --p2:#0bb8a6; --p2s:#dcf7f2;   /* teal */
    --p3:#ff6b5e; --p3s:#ffe6e2;   /* coral */
    --p4:#ffb020; --p4s:#fff2d6;   /* gold */
    --p5:#8b5cf6; --p5s:#efe8fe;   /* purple */
    --p6:#3b82f6; --p6s:#e2edfe;   /* blue */
    --p7:#22c55e; --p7s:#dcfae8;   /* green */
    --p8:#ec4899; --p8s:#fde4f1;   /* pink */
    --good:#16a34a; --bad:#ef4444; --warn:#f59e0b;
    --r:16px; --sh:0 1px 2px rgba(31,37,64,.04),0 8px 26px rgba(31,37,64,.07); --sh-sm:0 1px 3px rgba(31,37,64,.06);
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{background:var(--bg); color:var(--ink); font-family:"Inter","Segoe UI",system-ui,sans-serif; font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  header.top{position:sticky; top:0; z-index:50; background:linear-gradient(115deg,#e9ebff 0%,#dcf7f2 48%,#ffe9e3 100%); border-bottom:1px solid var(--line); padding:12px 22px; display:flex; align-items:center; gap:14px; flex-wrap:wrap}
  .brand{display:flex; align-items:baseline; gap:10px}
  .brand b{font-size:20px; font-weight:800; letter-spacing:.01em; background:linear-gradient(90deg,var(--p1),var(--p2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}
  .brand span{font-size:10px; color:var(--muted); letter-spacing:.2em; text-transform:uppercase; font-weight:700}
  .top .spacer{flex:1}
  .ctrl{display:flex; align-items:center; gap:7px}
  .ctrl label{font-size:10px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); font-weight:700}
  .ctrl input,.ctrl select{background:#fff; color:var(--ink); border:1px solid var(--line); border-radius:9px; padding:7px 9px; font:inherit; font-size:12px}
  .upload-btn{background:var(--p1); color:#fff; border:none; border-radius:10px; padding:9px 16px; font-weight:700; cursor:pointer; font-size:13px; box-shadow:0 5px 14px rgba(91,91,214,.32)}
  .upload-btn:hover{filter:brightness(1.06)}
  #fileName{font-size:11px; color:var(--muted)}
  .switch{display:inline-flex; align-items:center; gap:8px; cursor:pointer; user-select:none}
  .switch .track{width:40px;height:22px;border-radius:999px;background:#cfd6ec;position:relative;transition:.2s}
  .switch .track::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:.2s}
  .switch.on .track{background:var(--p2)} .switch.on .track::after{transform:translateX(18px)}
  .switch b{font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--ink-soft)}

  nav.tabs{position:sticky; top:56px; z-index:40; background:var(--bg); display:flex; gap:3px; padding:8px 16px 0; border-bottom:1px solid var(--line); flex-wrap:wrap}
  nav.tabs button{background:none; border:none; padding:11px 14px 12px; cursor:pointer; font:inherit; font-weight:700; font-size:13px; color:var(--muted); border-radius:11px 11px 0 0}
  nav.tabs button .n{font-family:var(--mono); font-size:10px; color:var(--faint); margin-right:6px}
  nav.tabs button:hover{color:var(--ink); background:var(--bg2)}
  nav.tabs button.active{color:var(--p1); background:var(--card); box-shadow:0 -2.5px 0 var(--p1) inset}
  nav.tabs button.active .n{color:var(--p1)}

  .filterbar{position:sticky; top:100px; z-index:35; background:var(--card); border:1px solid var(--line); border-radius:14px; margin:14px 22px 0; padding:10px 14px; display:flex; gap:11px; align-items:flex-end; flex-wrap:wrap; box-shadow:var(--sh-sm)}
  .filterbar .f{display:flex; flex-direction:column; gap:3px}
  .filterbar label{font-size:9.5px; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); font-weight:800}
  .filterbar select{border:1px solid var(--line); border-radius:9px; padding:7px 9px; font:inherit; font-size:12.5px; background:#fff; color:var(--ink); min-width:118px}
  .filterbar .reset{margin-left:auto; align-self:center; background:var(--p3s); color:#d8442f; border:none; border-radius:9px; padding:8px 13px; font-weight:700; cursor:pointer; font-size:12px}
  .msel{position:relative; min-width:140px}
  .msel-btn{border:1px solid var(--line); border-radius:9px; padding:7px 9px; font:inherit; font-size:12.5px; background:#fff; color:var(--ink); min-width:140px; max-width:220px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:6px; white-space:nowrap; overflow:hidden}
  .msel-btn .lbl{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .msel-btn .car{font-size:9px; color:var(--muted); flex:none}
  .msel-btn.active{border-color:var(--p1)}
  .msel-panel{position:absolute; top:calc(100% + 5px); left:0; z-index:60; background:#fff; border:1px solid var(--line); border-radius:11px; box-shadow:0 8px 28px rgba(31,37,64,.14); min-width:200px; max-width:280px; max-height:280px; overflow-y:auto; padding:6px; display:none}
  .msel-panel.open{display:block}
  .msel-row{display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:7px; cursor:pointer; font-size:12.5px}
  .msel-row:hover{background:var(--bg)}
  .msel-row input{margin:0; accent-color:var(--p1)}
  .msel-actions{display:flex; gap:6px; padding:4px 6px 8px; border-bottom:1px solid var(--line2); margin-bottom:4px}
  .msel-actions button{flex:1; border:none; background:var(--bg2); color:var(--p1); border-radius:7px; padding:5px 0; font-size:11px; font-weight:700; cursor:pointer}
  .filterbar .scope{font-size:11px;color:var(--muted);align-self:center} .filterbar .scope b{color:var(--p1)}

  main{padding:16px 22px 44px; max-width:1560px; margin:0 auto}
  .page{display:none} .page.active{display:block; animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .sectionhead{display:flex; align-items:center; gap:12px; margin:22px 0 13px}
  .sectionhead h2{font-size:15px; margin:0; font-weight:800; letter-spacing:.01em}
  .sectionhead .eyebrow{font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:#fff; background:var(--p1); padding:4px 9px; border-radius:7px; font-weight:700}
  .sectionhead .rule{flex:1; height:1px; background:var(--line)}
  .sectionhead.t2 .eyebrow{background:var(--p2)} .sectionhead.t3 .eyebrow{background:var(--p3)} .sectionhead.t4 .eyebrow{background:var(--p5)} .sectionhead.t5 .eyebrow{background:var(--p6)} .sectionhead.t6 .eyebrow{background:var(--p8)}

  .kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(148px,1fr)); gap:12px}
  .kpi{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:13px 15px; box-shadow:var(--sh); position:relative; overflow:hidden}
  .kpi .label{font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:800}
  .kpi .val{font-size:24px; font-weight:800; margin-top:5px; font-variant-numeric:tabular-nums; letter-spacing:-.02em}
  .kpi .sub{font-size:11px; color:var(--faint); margin-top:3px}
  .kpi::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--p1)}
  .kpi.c1::after{background:var(--p1)} .kpi.c2::after{background:var(--p2)} .kpi.c3::after{background:var(--p3)} .kpi.c4::after{background:var(--p4)} .kpi.c5::after{background:var(--p5)} .kpi.c6::after{background:var(--p6)} .kpi.c7::after{background:var(--p7)} .kpi.c8::after{background:var(--p8)}
  .kpi.c1{background:linear-gradient(180deg,var(--p1s),#fff 70%)} .kpi.c2{background:linear-gradient(180deg,var(--p2s),#fff 70%)} .kpi.c3{background:linear-gradient(180deg,var(--p3s),#fff 70%)} .kpi.c4{background:linear-gradient(180deg,var(--p4s),#fff 70%)} .kpi.c5{background:linear-gradient(180deg,var(--p5s),#fff 70%)} .kpi.c6{background:linear-gradient(180deg,var(--p6s),#fff 70%)} .kpi.c7{background:linear-gradient(180deg,var(--p7s),#fff 70%)} .kpi.c8{background:linear-gradient(180deg,var(--p8s),#fff 70%)}
  .up{color:var(--good); font-weight:800} .down{color:var(--bad); font-weight:800}

  .grid{display:grid; gap:14px; margin-top:4px}
  .g1{grid-template-columns:1fr} .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:1150px){.g3,.g4{grid-template-columns:repeat(2,1fr)}} @media(max-width:740px){.g2,.g3,.g4{grid-template-columns:1fr}}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:15px; box-shadow:var(--sh); display:flex; flex-direction:column; min-width:0}
  .card h3{margin:0 0 11px; font-size:13px; font-weight:800; display:flex; align-items:center; gap:8px}
  .card h3 .dot{width:9px;height:9px;border-radius:3px;background:var(--p1)}
  .card .chartwrap{position:relative; flex:1; min-height:230px} .card.tall .chartwrap{min-height:300px}
  .mapwrap{position:relative; flex:1; min-height:560px; display:flex; flex-direction:column}
  .mapwrap svg{width:100%; height:520px; display:block}
  .mapwrap .mapstate{stroke:#fff; stroke-width:.6; cursor:pointer; transition:filter .15s}
  .mapwrap .mapstate:hover{filter:brightness(.88)}
  .maplegend{display:flex; align-items:center; gap:8px; font-size:10.5px; color:var(--muted); margin-top:8px; padding:0 4px}
  .maplegend .bar{flex:1; height:10px; border-radius:5px; background:linear-gradient(90deg,#eef1fa,var(--p1))}
  .maptip{position:absolute; pointer-events:none; background:var(--ink); color:#fff; font-size:11px; padding:5px 9px; border-radius:7px; opacity:0; transition:opacity .1s; z-index:5; white-space:nowrap; font-weight:600}
  .mapstate{cursor:pointer}
  .dmodal{position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center}
  .dmodal-backdrop{position:absolute; inset:0; background:rgba(20,24,40,.55)}
  .dmodal-box{position:relative; background:var(--card); border-radius:16px; width:min(720px,92vw); max-height:88vh; overflow-y:auto; box-shadow:0 24px 60px rgba(20,24,40,.35); padding:0}
  .dmodal-head{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--card); border-radius:16px 16px 0 0}
  .dmodal-head h3{margin:0; font-size:16px; font-weight:800; color:var(--ink)}
  .dmodal-close{border:none; background:var(--bg2); color:var(--ink); width:30px; height:30px; border-radius:9px; font-size:14px; cursor:pointer}
  .dmodal-body{padding:18px 20px 22px}
  .dmodal-body .mapwrap{min-height:380px}
  .dmodal-body .mapwrap svg{height:340px}
  .mapmonth{display:flex; align-items:center; gap:8px; margin-bottom:8px}
  .mapmonth label{font-size:9.5px; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); font-weight:800}
  .mapmonth select{border:1px solid var(--line); border-radius:9px; padding:6px 9px; font:inherit; font-size:12.5px; background:#fff; color:var(--ink)}
  .spanfull{grid-column:1/-1}
  .podium{display:flex;gap:10px;flex-wrap:wrap}
  .pod{flex:1;min-width:120px;border-radius:12px;padding:12px;border:1px solid var(--line)}
  .pod.good{background:var(--p7s)} .pod.bad{background:var(--p3s)}
  .pod .rank{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .pod .nm{font-size:14px;font-weight:800;margin:3px 0}
  .pod .mt{font-size:11px;color:var(--ink-soft)}

  table{width:100%; border-collapse:collapse; font-size:12.5px}
  th,td{padding:7px 9px; text-align:right; border-bottom:1px solid var(--line2); font-variant-numeric:tabular-nums; white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th{font-size:9.5px; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); font-weight:800; background:var(--card); position:sticky; top:0}
  table.sortable th{cursor:pointer; user-select:none} table.sortable th:hover{color:var(--p1)}
  table.sortable th::after{content:"\2195"; opacity:.25; margin-left:4px; font-size:10px}
  table.sortable th.sortAsc::after{content:"\2191"; opacity:.9; color:var(--p1)} table.sortable th.sortDesc::after{content:"\2193"; opacity:.9; color:var(--p1)}
  tbody tr:hover{background:var(--bg2)}
  .scrolly{max-height:420px; overflow:auto; border:1px solid var(--line); border-radius:12px}
  .scrollx{overflow-x:auto; border:1px solid var(--line); border-radius:12px}
  .num{font-family:var(--mono); font-size:12px}
  .pill{display:inline-block; padding:2px 9px; border-radius:999px; font-size:10.5px; font-weight:700}
  .pill.r{background:var(--p2s); color:#0a8a7d} .pill.p{background:var(--p3s); color:#d8442f} .pill.t{background:var(--p5s); color:#7c43e0}
  .delta-up{color:var(--good); font-weight:800} .delta-dn{color:var(--bad); font-weight:800}
  .badge{padding:2px 8px;border-radius:7px;font-size:10px;font-weight:800}
  .b-ap{background:var(--p7s);color:#15803d} .b-un{background:var(--p4s);color:#b45309}
  .b-risk{background:var(--p3s);color:#d8442f} .b-watch{background:var(--p4s);color:#b45309} .b-good{background:var(--p7s);color:#15803d}
  .insight-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--sh-sm)}
  .insight-card h4{margin:0 0 8px;font-size:13.5px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:8px}
  .insight-card ul{margin:6px 0 0;padding-left:18px;font-size:12.5px;line-height:1.7;color:var(--ink-soft)}
  .insight-card ul li{margin-bottom:3px}
  .insight-card .crit{font-size:10px;color:var(--muted);margin-top:10px;padding-top:8px;border-top:1px solid var(--line2)}

  .empty{text-align:center; padding:66px 20px; color:var(--muted)}
  .spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--p1);margin:22px auto 0;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty .big{font-size:18px; font-weight:800; color:var(--ink); margin-bottom:8px}
  .empty .hint{max-width:580px; margin:0 auto 16px; font-size:13px; line-height:1.6}
  .empty code{background:var(--p1s); padding:2px 6px; border-radius:5px; font-family:var(--mono); font-size:12px; color:var(--p1)}
  .drop{border:2px dashed var(--line); border-radius:var(--r); padding:36px; margin:16px auto 0; max-width:560px; background:var(--card)}
  .drop.hot{border-color:var(--p1); background:var(--p1s)}
  .footnote{font-size:11px; color:var(--faint); margin-top:8px} .miss{color:var(--bad)}
  .toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:11px 18px; border-radius:11px; font-size:13px; z-index:99; box-shadow:0 10px 30px rgba(0,0,0,.2); display:none}
</style>
</head>
<body>

<header class="top">
  <div class="brand"><b>XCLAIM</b><span>Claims Intelligence</span></div>
  <div class="spacer"></div>
  <div class="ctrl" id="fyCtrl" style="display:none"><div class="switch" id="fySwitch"><div class="track"></div><b>FY</b></div><select id="fySel" style="display:none"></select></div>
  <div class="ctrl" id="monthCtrl" style="display:none"><label>Month</label><select id="monthSel"></select></div>
  <div class="ctrl" id="dateCtrl" style="display:none"><label>As of</label><input type="date" id="asOf"></div>
  <div class="ctrl" id="activeCtrl" style="display:none"><label>Active ≥</label><select id="activeN"></select></div>
  <div class="ctrl"><input type="file" id="file" accept=".xlsx,.xlsm" style="display:none"><button class="upload-btn" id="uploadBtn">Upload Excel</button><span id="fileName"></span></div>
</header>

<nav class="tabs" id="tabs" style="display:none">
  <button data-tab="intimation" class="active"><span class="n">01</span>Intimation</button>
  <button data-tab="submission"><span class="n">02</span>Submission</button>
  <button data-tab="outstanding"><span class="n">03</span>Outstanding</button>
  <button data-tab="assessor"><span class="n">04</span>Assessor</button>
  <button data-tab="cce"><span class="n">05</span>CCE</button>
  <button data-tab="upload"><span class="n">06</span>Uploading</button>
  <button data-tab="hub"><span class="n">07</span>Hub</button>
  <button data-tab="ro"><span class="n">08</span>RO</button>
  <button data-tab="perf"><span class="n">09</span>Performance Report</button>
  <button data-tab="density"><span class="n">10</span>Intimation Penetration</button>
  <button data-tab="insights"><span class="n">11</span>Insights</button>
</nav>

<div class="filterbar" id="filterbar" style="display:none">
  <div id="flt_insurer_holder"></div>
  <div id="flt_zone_holder"></div>
  <div id="flt_segment_holder"></div>
  <div id="flt_vtype_holder"></div>
  <div class="scope" id="scopeNote"></div>
  <button class="reset" id="fltReset">Reset</button>
</div>

<main>
  <div id="landing" class="empty">
    <div class="big" id="loadingTitle">Loading latest claims data…</div>
    <div class="hint" id="loadingHint">Fetching the latest workbook from GitHub. This usually takes a few seconds.</div>
    <div class="spinner" id="loadSpinner"></div>
    <div id="loadMsg" class="footnote" style="margin-top:16px"></div>
    <div class="drop" id="drop" style="display:none">
      <button class="upload-btn" id="uploadBtn2">Choose .xlsx file</button>
      <div class="footnote" style="margin-top:12px">Runs entirely in your browser — your data never leaves this page.</div>
    </div>
  </div>
  <div id="page-intimation" class="page active"></div>
  <div id="page-submission" class="page"></div>
  <div id="page-outstanding" class="page"></div>
  <div id="page-assessor" class="page"></div>
  <div id="page-cce" class="page"></div>
  <div id="page-upload" class="page"></div>
  <div id="page-hub" class="page"></div>
  <div id="page-ro" class="page"></div>
  <div id="page-perf" class="page"></div>
  <div id="page-density" class="page"></div>
  <div id="page-insights" class="page"></div>
</main>
<div class="toast" id="toast"></div>
<div class="dmodal" id="dmodal" style="display:none">
  <div class="dmodal-backdrop" id="dmodalBackdrop"></div>
  <div class="dmodal-box">
    <div class="dmodal-head">
      <h3 id="dmodalTitle">State</h3>
      <button class="dmodal-close" id="dmodalClose">✕</button>
    </div>
    <div class="dmodal-body" id="dmodalBody"></div>
  </div>
</div>

<script>
/* ===== PART 1 — utilities ===== */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];

/* ---- reusable multi-select dropdown ---- */
function mselHTML(id,label,options,selected){
  const sel=selected||[];
  const lbl=sel.length===0?"All":(sel.length===1?String(sel[0]):sel.length+" selected");
  return `<div class="f"><label>${label}</label><div class="msel" id="${id}_wrap">
    <button type="button" class="msel-btn${sel.length?" active":""}" id="${id}_btn"><span class="lbl">${lbl}</span><span class="car">▾</span></button>
    <div class="msel-panel" id="${id}_panel">
      <div class="msel-actions"><button type="button" data-act="all">All</button><button type="button" data-act="none">None</button></div>
      ${options.map(o=>`<label class="msel-row"><input type="checkbox" value="${o}" ${sel.includes(o)?"checked":""}>${o}</label>`).join("")}
    </div>
  </div></div>`;
}
function wireMsel(id,onChange){
  const wrap=$("#"+id+"_wrap"); if(!wrap)return;
  const btn=$("#"+id+"_btn"), panel=$("#"+id+"_panel");
  btn.onclick=e=>{e.stopPropagation();$$(".msel-panel.open").forEach(p=>{if(p!==panel)p.classList.remove("open");});panel.classList.toggle("open");};
  panel.querySelectorAll('input[type="checkbox"]').forEach(cb=>{cb.onchange=()=>{
    const vals=[...panel.querySelectorAll('input[type="checkbox"]:checked')].map(c=>c.value);
    onChange(vals);
  };});
  panel.querySelectorAll('[data-act]').forEach(b=>{b.onclick=e=>{e.stopPropagation();
    const cbs=[...panel.querySelectorAll('input[type="checkbox"]')];

const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const fmt=n=>(n==null||isNaN(n))?"–":Math.round(n).toLocaleString("en-IN");
const fmt1=n=>(n==null||isNaN(n))?"–":(Math.round(n*10)/10).toLocaleString("en-IN");

const money=n=>(n==null||isNaN(n))?"–":"₹"+Math.round(n).toLocaleString("en-IN");
function toast(m){const t=$("#toast");t.textContent=m;t.style.display="block";clearTimeout(t._t);t._t=setTimeout(()=>t.style.display="none",3600);}
function has(h,n){return h!=null&&String(h).toUpperCase().includes(n.toUpperCase());}
const val=v=>v==null||v===""?"":String(v).trim();
function parseDate(v){if(v==null||v==="")return null;
  if(v instanceof Date&&!isNaN(v))return new Date(v.getFullYear(),v.getMonth(),v.getDate());
  if(typeof v==="number"){const d=new Date(Math.round((v-25569)*86400*1000));return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate());}
  let s=String(v).trim(); let m=s.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4})/);
  if(m){const mo=MONTHS.findIndex(x=>x.toLowerCase()===m[2].toLowerCase());if(mo>=0)return new Date(+m[3],mo,+m[1]);}
  m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m)return new Date(+m[1],+m[2]-1,+m[3]);
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m)return new Date(+m[3],+m[1]-1,+m[2]);

  if(tv!=null&&tv!==""){if(typeof tv==="number"){const t=tv%1;h=Math.floor(t*24);mi=Math.round((t*24-h)*60);}
    else{const m=String(tv).trim().match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);if(m){h=+m[1];mi=+m[2];const ap=(m[3]||"").toUpperCase();if(ap==="PM"&&h<12)h+=12;if(ap==="AM"&&h===12)h=0;}}}

const dayKey=d=>d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`:null;

function workdays(d1,d2){if(!d1||!d2||d2<d1)return 0;let n=0,c=new Date(d1);while(c<=d2){if(c.getDay()!==0)n++;c=new Date(c.getFullYear(),c.getMonth(),c.getDate()+1);}return n;}
const normCode=c=>String(c||"").trim().toUpperCase().replace(/^PB-/,"");
const fyStartYear=d=>d.getMonth()>=3?d.getFullYear():d.getFullYear()-1;
const fyLabel=y=>"FY"+y+"-"+String(y+1).slice(2);
const W_OPEN=10,W_CLOSE=19,W_MIN=(W_CLOSE-W_OPEN)*60;
function businessMinutes(start,end){if(!start||!end)return null;if(end<=start)return 0;
  let s=new Date(start),e=new Date(end);const openOf=d=>new Date(d.getFullYear(),d.getMonth(),d.getDate(),W_OPEN,0,0);const closeOf=d=>new Date(d.getFullYear(),d.getMonth(),d.getDate(),W_CLOSE,0,0);
  let sh=s.getHours()+s.getMinutes()/60; if(sh<W_OPEN)s=openOf(s);else if(sh>W_CLOSE)s=openOf(new Date(s.getFullYear(),s.getMonth(),s.getDate()+1));
  let eh=e.getHours()+e.getMinutes()/60; if(eh<W_OPEN)e=openOf(e);else if(eh>W_CLOSE)e=closeOf(e);
  if(e<=s)return 0; const isSun=d=>d.getDay()===0;
  if(dayKey(s)===dayKey(e)){if(isSun(s))return 0;return Math.max(0,(Math.min(e,closeOf(s))-Math.max(s,openOf(s)))/60000);}
  let total=0; if(!isSun(s))total+=Math.max(0,(closeOf(s)-s)/60000); if(!isSun(e))total+=Math.max(0,(e-openOf(e))/60000);

  while(cur<=last){if(!isSun(cur))total+=W_MIN;cur=new Date(cur.getFullYear(),cur.getMonth(),cur.getDate()+1);} return total;}

function avg(a){const v=a.filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((p,c)=>p+c,0)/v.length:null;}
function quantile(arr,q){const v=arr.filter(x=>x!=null&&!isNaN(x)).slice().sort((a,b)=>a-b);if(!v.length)return null;
  const pos=(v.length-1)*q,base=Math.floor(pos),rest=pos-base;
  return v[base+1]!==undefined?v[base]+rest*(v[base+1]-v[base]):v[base];}
function median(arr){return quantile(arr,.5);}
function tally(rows,fn){const m=new Map();for(const r of rows){const k=fn(r);if(k==null||k==="")continue;m.set(k,(m.get(k)||0)+1);}return m;}

<script>
/* ===== PART 2 — data engine ===== */
let DB=null, charts={};
const col=L=>{let n=0;for(const c of L)n=n*26+(c.charCodeAt(0)-64);return n-1;};

  created:col("T"),createdTime:col("U"),settle:col("AE"),allocD:col("AF"),allocT:col("AG"),inspDepD:col("AH"),inspDepT:col("AI"),
  inspCompD:col("AJ"),inspCompT:col("AK"),roD:col("AQ"),roT:col("AR"),invGenD:col("AS"),invAmt:col("AV"),finalD:col("AW"),
  cce:col("BB"),assessor:col("BC"),officeCode:col("BF"),estimate:col("BH"),nextAction:col("BP"),remarkUpd:col("BQ"),
  dInsurer:col("BX"),dProduct:col("BY"),dSeg:col("BZ"),dZone:col("CA"),dStatus:col("CB"),dIntCode:col("CS")};
function classifyInsurer(e){if(has(e,"United"))return"United";if(has(e,"New India"))return"New India";if(has(e,"National"))return"National";if(has(e,"Oriental"))return"Oriental";return"";}
function classifyProduct(e,h,n){h=h==null?"":String(h);n=n==null?"":String(n);const L6=h.slice(0,6),len=h.length;
  if(has(e,"PB-Oriental"))return"PB-Oriental";if(has(e,"Oriental"))return"Retail-Oriental";if(has(e,"PB-United"))return"PB-United";if(has(e,"United"))return"Retail-United";if(has(e,"PB-New India"))return"PB-New India";
  if(has(e,"New India")){if(L6==="980000"&&has(n,"MARUTI"))return"Maruti-New India";
    if(L6==="800000"){if(has(n,"HYUNDAI"))return"Hyundai-New India";if(has(n,"TATA"))return"Tata-New India";if(has(n,"MORRIS"))return"Morris-New India";return"Retail-New India";}
    if(L6==="770000"){if(has(n,"TOYOTA"))return"Toyota-New India";if(has(n,"RENAULT")||has(n,"NISSAN"))return"Renault/Nissan-New India";return"Retail-New India";}
    if(L6==="712900"){if(has(n,"RENAULT")||has(n,"NISSAN"))return"Renault/Nissan-New India";return"Retail-New India";}return"Retail-New India";}
  if(has(e,"PB-National"))return"PB-National";
  if(has(e,"National")){if(len===18)return"Retail-National";if(len===20&&L6==="390102")return"Hero-National";if(len===20&&L6==="552700")return"TATA-National";if(len===20&&h.charAt(10)==="1")return"Maruti-National";if(len===20&&h.charAt(10)==="3")return"Honda-National";return"Retail-National";}return"";}

function internalCode(ins,o){o=o==null?"":String(o);if(ins==="United")return"UIIC-"+o;if(ins==="National")return"NICL-"+o;if(ins==="New India")return"NIACL-"+o;if(ins==="Oriental")return"OICL-"+o;return"";}

function readPeople(arr){ // Assessor/CCE sheet: find header row (A==Zone), map name->{zone,tl,target}
  const out={}; if(!arr)return out; let hr=-1;
  for(let i=0;i<Math.min(arr.length,8);i++){const row=(arr[i]||[]).map(x=>String(x||"").trim().toLowerCase());if(row.includes("zone")){hr=i;break;}}
  if(hr<0)return out; const H=(arr[hr]||[]).map(x=>String(x||"").trim().toLowerCase());

  let gi=H.findIndex(x=>x==="tgt"||x==="target");
  for(let i=hr+1;i<arr.length;i++){const r=arr[i];if(!r)continue;const nm=val(r[ni]);if(!nm||nm==="-")continue;

  return out;}

function buildModel(wb){
  const get=n=>wb.Sheets[n]?XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,raw:true,defval:""}):null;
  const baseA=get("Base"); if(!baseA||baseA.length<2)throw new Error("No 'Base' sheet found.");
  // Hub A:L  (K target, L approved)

  if(hubA){let hr=0;for(let i=0;i<Math.min(hubA.length,12);i++){const row=(hubA[i]||[]).map(x=>String(x||"").trim().toLowerCase());if(row.includes("internal code")||row.includes("zone")){hr=i;break;}}
    for(let i=hr+1;i<hubA.length;i++){const r=hubA[i];if(!r||r[0]===""||r[0]==null)continue;
      const o={code:val(r[0]),zone:val(r[1]),classification:val(r[2]),insurer:val(r[3]),officeCode:val(r[4]),office:val(r[5]),roCode:val(r[6]),roName:val(r[7]),responsible:val(r[8]),state:val(r[9]),city:val(r[10]),target:+String(r[11]).replace(/[^0-9.\-]/g,"")||0,approved:val(r[12])};
      o.roKey=o.roName?o.roName+"|"+o.insurer:""; hub[o.code]=o;hubRows.push(o);}}
  // people
  const aMeta=readPeople(get("Assessor")), cMeta=readPeople(get("CCE"));
  // Targets sheet (zone etc.)
  const tgtA=get("Targets"); const targets={Assessor:{},CCE:{},Zone:{},Branch:{}};
  if(tgtA)for(let i=1;i<tgtA.length;i++){const r=tgtA[i];if(!r||r[0]==="")continue;const cat=val(r[0]),nm=val(r[1]),t=+r[2]||0;if(targets[cat])targets[cat][nm]=t;}
  // Upl. Base — A:Name B:Case Code C:Upload Date D:Email Received Date E:Insurer
  const uplA=get("Upl. Base"); const upl=[];
  if(uplA)for(let i=1;i<uplA.length;i++){const r=uplA[i];if(!r||r[0]==="")continue;

  // Base rows
  const rows=[]; let maxD=null; const caseFinal={};

    const product=val(r[C.dProduct])||classifyProduct(r[C.insurerRaw],r[C.policy],r[C.make]);
    const segment=val(r[C.dSeg])||segOf(product);
    const ic=val(r[C.dIntCode])||internalCode(insurer,r[C.officeCode]); const h=hub[ic]||{};
    const zone=val(r[C.dZone])||h.zone||"";
    const status=val(r[C.dStatus])||statusOf(r[C.status]);
    const created=parseDate(r[C.created]), finalD=parseDate(r[C.finalD]);
    const inspDepD=parseDate(r[C.inspDepD]), inspCompD=parseDate(r[C.inspCompD]);
    if(created&&(!maxD||created>maxD))maxD=created; if(finalD&&(!maxD||finalD>maxD))maxD=finalD;
    if(r[C.case]!==""&&finalD){const k=normCode(r[C.case]);if(!caseFinal[k])caseFinal[k]=finalD;}
    const subTAT=(created&&finalD)?Math.round((finalD-created)/86400000):null;
    const vro=businessMinutes(parseDateTime(r[C.allocD],r[C.allocT]),parseDateTime(r[C.roD],r[C.roT]));
    const link=businessMinutes(parseDateTime(r[C.created],r[C.createdTime]),parseDateTime(r[C.inspDepD],r[C.inspDepT]));
    const comp=businessMinutes(parseDateTime(r[C.inspDepD],r[C.inspDepT]),parseDateTime(r[C.inspCompD],r[C.inspCompT]));
    const allocFSR=(parseDate(r[C.allocD])&&finalD)?Math.round((finalD-parseDate(r[C.allocD]))/86400000):null;

      make:val(r[C.make])||"—",model:val(r[C.model])||"—",vtype:val(r[C.vtype])||"—",assessor,cce,
      created,finalD,inspDepD,inspCompD,settle,estimate,setRatio,subTAT,vro,link,comp,allocFSR,invFSR,intCode:ic,
      nextAction:parseDate(r[C.nextAction]),remarkUpd:parseDate(String(r[C.remarkUpd]||"").slice(0,11)),

/* ===== PART 3 — period engine ===== */
function computePeriod(){const asOf=state.asOf;
  if(state.fyMode){const y=state.fy,start=new Date(y,3,1),fyEnd=new Date(y+1,2,31);const end=(asOf>=start&&asOf<=fyEnd)?asOf:fyEnd;
    const pStart=new Date(y-1,3,1),pEnd=addYears(end,-1);const trend=[];let c=new Date(start.getFullYear(),start.getMonth(),1);while(c<=end){trend.push(new Date(c));c=addMonths(c,1);}
    return {curStart:start,curEnd:end,prevStart:pStart,prevEnd:pEnd,curLabel:"FYTD",prevLabel:"Last FYTD",trend,trendBy:"month",inCur:d=>d&&d>=start&&d<=end,inPrev:d=>d&&d>=pStart&&d<=pEnd,isFTD:d=>sameDay(d,asOf),scope:fyLabel(y)};}
  const mStart=new Date(asOf.getFullYear(),asOf.getMonth(),1),lmStart=addMonths(mStart,-1);
  const lastLm=new Date(lmStart.getFullYear(),lmStart.getMonth()+1,0).getDate();
  const lmEnd=new Date(lmStart.getFullYear(),lmStart.getMonth(),Math.min(asOf.getDate(),lastLm));
  const trend=[];for(let d=1;d<=asOf.getDate();d++)trend.push(d);
  return {curStart:mStart,curEnd:asOf,prevStart:lmStart,prevEnd:lmEnd,curLabel:"MTD",prevLabel:"LMTD",trend,trendBy:"day",inCur:d=>d&&d>=mStart&&d<=asOf,inPrev:d=>d&&d>=lmStart&&d<=lmEnd,isFTD:d=>sameDay(d,asOf),scope:mLabel(asOf)};}
/* previous 3 full months descending (May, Apr, Mar when current=Jun) */
function prev3(){const a=state.asOf,m0=new Date(a.getFullYear(),a.getMonth(),1);return [addMonths(m0,-1),addMonths(m0,-2),addMonths(m0,-3)];}

function univ(zoneField){const f=state.flt,zf=zoneField||"zone";
  return DB.rows.filter(r=>{if(f.insurer.length&&!f.insurer.includes(r.insurer))return false;if(f.segment.length&&!f.segment.includes(r.segment))return false;if(f.vtype.length&&!f.vtype.includes(r.vtype))return false;if(f.zone.length&&!f.zone.includes(r[zf]||r.zone))return false;return true;});}

/* sortable */
document.addEventListener("click",e=>{const th=e.target.closest("table.sortable th");if(!th)return;

  rows.sort((a,b)=>{const x=a.cells[idx]?.innerText||"",y=b.cells[idx]?.innerText||"";const nx=num(x),ny=num(y);let c=(nx!=null&&ny!=null)?nx-ny:x.localeCompare(y);return dir==="asc"?c:-c;});
  rows.forEach(r=>tb.appendChild(r));table.dataset.sortcol=idx;table.dataset.sortdir=dir;[...th.parentNode.children].forEach(h=>h.classList.remove("sortAsc","sortDesc"));th.classList.add(dir==="asc"?"sortAsc":"sortDesc");});

/* charts */
Chart.defaults.font.family="Inter,system-ui,sans-serif";Chart.defaults.font.size=11;Chart.defaults.color="#737c9e";
const PAL=["#5b5bd6","#0bb8a6","#ff6b5e","#ffb020","#8b5cf6","#3b82f6","#22c55e","#ec4899","#7a7aee","#34d0bf","#ff8c82","#a78bfa"];
const SEGC=["#0bb8a6","#ff6b5e","#8b5cf6"];
const DL={id:"dl",afterDatasetsDraw(chart,a,opts){if(!opts||!opts.on)return;const {ctx}=chart;ctx.save();ctx.font="700 10px Inter";ctx.fillStyle="#1f2540";
  const isPie=chart.config.type==="doughnut"||chart.config.type==="pie";
  if(isPie){
    const ds=chart.data.datasets[0]||{data:[]}; const meta=chart.getDatasetMeta(0); if(!meta)return;
    const total=ds.data.reduce((s,v)=>s+(+v||0),0)||1;
    ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="#fff";ctx.font="700 11px Inter";
    meta.data.forEach((el,i)=>{const v=ds.data[i];if(v==null||v===0)return;
      const angle=(el.startAngle+el.endAngle)/2; const r=(el.outerRadius+el.innerRadius)/2;
      const x=el.x+Math.cos(angle)*r, y=el.y+Math.sin(angle)*r;
      const label=opts.mode==="value"?fmt(v):pct(v/total);
      ctx.fillText(label,x,y);});
    ctx.restore();return;
  }
  chart.data.datasets.forEach((ds,di)=>{const meta=chart.getDatasetMeta(di);if(meta.hidden)return;meta.data.forEach((el,i)=>{const v=ds.data[i];if(v==null||v===0)return;
    const horiz=chart.options.indexAxis==="y";ctx.textAlign=horiz?"left":"center";ctx.textBaseline=horiz?"middle":"bottom";
    const x=horiz?el.x+4:el.x;const y=horiz?el.y:el.y-3;ctx.fillText(fmt(v),x,y);});});ctx.restore();}};
Chart.register(DL);
function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;if(charts[id])charts[id].destroy();
  if(cfg.options&&cfg.options.indexAxis==="y"){
    const n=(cfg.data&&cfg.data.labels?cfg.data.labels.length:0);
    const perBar=cfg.data.datasets&&cfg.data.datasets.length>1?30:26; // a bit more room for grouped/multi-series bars
    const h=Math.max(230,n*perBar+40);
    const wrap=el.closest(".chartwrap"); if(wrap)wrap.style.minHeight=h+"px";
    el.parentElement&&(el.parentElement.style.height=h+"px");
  }
  charts[id]=new Chart(el,cfg);}
function clearCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}
function barCfg(labels,data,horizontal,colors,dl){return {type:"bar",data:{labels,datasets:[{data,backgroundColor:colors||PAL[0],borderRadius:6,maxBarThickness:32}]},
  options:{indexAxis:horizontal?"y":"x",responsive:true,maintainAspectRatio:false,layout:{padding:dl?(horizontal?{right:36}:{top:16}):0},plugins:{legend:{display:false},dl:{on:!!dl}},
    scales:{x:{grid:{display:!horizontal,color:"#eef1fa"},ticks:{autoSkip:!horizontal,maxRotation:60,minRotation:0}},
      y:{grid:{display:horizontal,color:"#eef1fa"},beginAtZero:true,ticks:{precision:0,autoSkip:false,font:{size:11}}}}}};}
function groupedCfg(labels,sets,horiz,dl){return {type:"bar",data:{labels,datasets:sets.map((s,i)=>({label:s.label,data:s.data,backgroundColor:s.color||PAL[i],borderRadius:5,maxBarThickness:26}))},
  options:{indexAxis:horiz?"y":"x",responsive:true,maintainAspectRatio:false,layout:{padding:dl?(horiz?{right:36}:{top:16}):0},plugins:{legend:{position:"top",labels:{boxWidth:11,usePointStyle:true,pointStyle:"rectRounded"}},dl:{on:!!dl}},
    scales:{x:{grid:{color:"#eef1fa"},beginAtZero:true,ticks:{autoSkip:!horiz}},y:{grid:{color:"#eef1fa"},beginAtZero:true,ticks:{precision:0,autoSkip:!horiz,font:{size:11}}}}}};}
function doughnutCfg(labels,data,colors,dlMode){return {type:"doughnut",data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:"#fff"}]},options:{responsive:true,maintainAspectRatio:false,cutout:"60%",plugins:{legend:{position:"right",labels:{boxWidth:11,boxHeight:11,usePointStyle:true,pointStyle:"rectRounded"}},dl:{on:true,mode:dlMode||"pct"}}}};}
function lineCfg(labels,sets,dl){return {type:"line",data:{labels,datasets:sets.map((d,i)=>({label:d.label,data:d.data,borderColor:d.color||PAL[i],backgroundColor:(d.color||PAL[i])+"22",fill:d.fill!==false,tension:.35,pointRadius:3,borderWidth:2}))},
  options:{responsive:true,maintainAspectRatio:false,layout:{padding:dl?{top:18}:0},plugins:{legend:{display:sets.length>1,position:"top",labels:{boxWidth:11,usePointStyle:true,pointStyle:"line"}},dl:{on:!!dl}},scales:{x:{grid:{display:false},ticks:{maxRotation:60,autoSkip:true,maxTicksLimit:16}},y:{beginAtZero:true,grid:{color:"#eef1fa"},ticks:{precision:0}}}}};}
const card=(t,b,cls,extra)=>`<div class="card ${cls||""}"><h3><span class="dot"></span>${t}${extra||""}</h3>${b}</div>`;
const cv=id=>`<div class="chartwrap"><canvas id="${id}"></canvas></div>`;
function table(headers,rowsHTML,opt={}){const cls=opt.x?"scrollx":"scrolly";return `<div class="${cls}"><table class="${opt.sortable===false?'':'sortable'}"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${rowsHTML}</tbody></table></div>`;}
const emptyRow=n=>`<tr data-nosort="1"><td colspan="${n}" style="text-align:center;color:var(--faint);padding:18px">Nothing in this view</td></tr>`;
const segPill=s=>s==="Retail"?'<span class="pill r">Retail</span>':s==="PB"?'<span class="pill p">PB</span>':s==="Tie-up"?'<span class="pill t">Tie-up</span>':"–";
function kpi(label,v,sub,cls){return `<div class="kpi ${cls||""}"><div class="label">${label}</div><div class="val">${v}</div>${sub?`<div class="sub">${sub}</div>`:""}</div>`;}
function deltaSub(cur,prev,lbl){const d=cur-prev,a=d>=0?"up":"down",s=d>=0?"▲":"▼";return `vs ${lbl} <b class="${a}">${s} ${fmt(Math.abs(d))}</b> · ${prev?pct(d/prev):"–"}`;}
let topNPref=10;
function topNctl(){return `<select id="topNsel" style="margin-left:auto;border:1px solid var(--line);border-radius:8px;padding:3px 7px;font:inherit;font-size:11px"><option value="10" ${topNPref===10?"selected":""}>Top 10</option><option value="20" ${topNPref===20?"selected":""}>Top 20</option></select>`;}
function wireTopN(re){const el=$("#topNsel");if(el)el.onchange=()=>{topNPref=+el.value;re();};}
function podium(arr,cls,fmtFn){return `<div class="podium">${arr.map((x,i)=>`<div class="pod ${cls}"><div class="rank">#${i+1}</div><div class="nm">${x.name}</div><div class="mt">${fmtFn(x)}</div></div>`).join("")||'<div class="mt" style="color:var(--faint)">Not enough data</div>'}</div>`;}
</script>

<script>
/* ===== TAB 1 — INTIMATION ===== */
function renderIntimation(){
  const P=computePeriod(), all=univ("zone"), aN=state.activeN, P3=prev3(), p3h=P3.map(mLabel);
  const f=state.flt;
  // single pass: per-branch, per-roKey, per-classification, plus mix tallies
  const EA=()=>({ftd:0,cur:0,prev:0,m0:0,m1:0,m2:0});
  const hubAgg=new Map(),roAgg=new Map(),clsAgg=new Map();
  const insMix=new Map(),segMix=new Map(),vMix=new Map(),makeMix=new Map(),modelMix=new Map();
  const dayMix=new Map(),monMix=new Map();
  let curTot=0,prevTot=0,ftdTot=0,cancel=0;
  const bump=(map,k,fld)=>{if(!k)return;let a=map.get(k);if(!a){a=EA();map.set(k,a);}a[fld]++;};
  for(const r of all){const c=r.created;if(!c)continue;
    const isC=P.inCur(c),isP=P.inPrev(c),isF=P.isFTD(c);
    if(isC){curTot++; insMix.set(r.insurer,(insMix.get(r.insurer)||0)+1); segMix.set(r.segment,(segMix.get(r.segment)||0)+1); vMix.set(r.vtype,(vMix.get(r.vtype)||0)+1); makeMix.set(r.make,(makeMix.get(r.make)||0)+1); modelMix.set(r.model,(modelMix.get(r.model)||0)+1);
      if(P.trendBy==="day")dayMix.set(c.getDate(),(dayMix.get(c.getDate())||0)+1); else monMix.set(monKey(c),(monMix.get(monKey(c))||0)+1);
      if(r.status==="Case Cancelled")cancel++;}
    if(isP)prevTot++; if(isF)ftdTot++;
    const upd=(map,k)=>{if(!k)return;let a=map.get(k);if(!a){a=EA();map.set(k,a);}if(isF)a.ftd++;if(isC)a.cur++;if(isP)a.prev++;if(inMonth(c,P3[0]))a.m0++;if(inMonth(c,P3[1]))a.m1++;if(inMonth(c,P3[2]))a.m2++;};
    upd(hubAgg,r.branch);upd(roAgg,r.roKey);upd(clsAgg,r.classification);}
  // hub target (sum of Hub col K) honoring insurer/zone filters
  let intimTgt=0; for(const o of DB.hubRows){if(f.insurer&&o.insurer!==f.insurer)continue;if(f.zone&&o.zone!==f.zone)continue;intimTgt+=o.target||0;}
  const overallHub=new Set(DB.hubRows.map(o=>o.office).filter(Boolean)).size||hubAgg.size;
  const overallRO=new Set(DB.hubRows.map(o=>o.roKey).filter(Boolean)).size||roAgg.size;
  const activeHub=[...hubAgg.values()].filter(a=>a.cur>=aN).length, activeRO=[...roAgg.values()].filter(a=>a.cur>=aN).length;
  const moveArr=m=>[...m.entries()].map(([k,a])=>({k,...a,d:a.cur-a.prev}));
  const hubMove=moveArr(hubAgg),roMove=moveArr(roAgg);
  const gHub=hubMove.filter(x=>x.d>0).length,dHub=hubMove.filter(x=>x.d<0).length,gRO=roMove.filter(x=>x.d>0).length,dRO=roMove.filter(x=>x.d<0).length;
  const roParts=k=>{const i=k.lastIndexOf("|");return i<0?[k,""]:[k.slice(0,i),k.slice(i+1)];};
  const hubInsurer=k=>{const o=DB.hubRows.find(o=>o.office===k);return o?o.insurer:"";};
  const moveTableHub=arr=>table(["Hub","Insurer","FTD",P.curLabel,P.prevLabel,"Δ",...p3h],arr.map(x=>{const cls=x.d>=0?"delta-up":"delta-dn",s=x.d>=0?"▲":"▼";
    return `<tr><td>${x.k}</td><td>${hubInsurer(x.k)}</td><td class="num">${x.ftd}</td><td class="num">${x.cur}</td><td class="num">${x.prev}</td><td class="${cls}">${s} ${Math.abs(x.d)}</td><td class="num">${x.m0}</td><td class="num">${x.m1}</td><td class="num">${x.m2}</td></tr>`;}).join("")||emptyRow(9),{x:true});
  const moveTableRO=arr=>table(["RO","Insurer","FTD",P.curLabel,P.prevLabel,"Δ",...p3h],arr.map(x=>{const [ro,ins]=roParts(x.k);const cls=x.d>=0?"delta-up":"delta-dn",s=x.d>=0?"▲":"▼";
    return `<tr><td>${ro}</td><td>${ins}</td><td class="num">${x.ftd}</td><td class="num">${x.cur}</td><td class="num">${x.prev}</td><td class="${cls}">${s} ${Math.abs(x.d)}</td><td class="num">${x.m0}</td><td class="num">${x.m1}</td><td class="num">${x.m2}</td></tr>`;}).join("")||emptyRow(9),{x:true});
  const byInsurer=topN(insMix,12),byMake=topN(makeMix,topNPref),byModel=topN(modelMix,topNPref);
  const clsRows=[...clsAgg.entries()].map(([cl,a])=>({cl,...a})).sort((a,b)=>b.cur-a.cur);
  let trL,trD; if(P.trendBy==="day"){trL=P.trend.map(d=>{const dt=new Date(state.asOf.getFullYear(),state.asOf.getMonth(),d);return d+" "+DOW[dt.getDay()];});trD=P.trend.map(d=>dayMix.get(d)||0);}
  else{trL=P.trend.map(mLabel);trD=P.trend.map(m=>monMix.get(monKey(m))||0);}

  $("#page-intimation").innerHTML=`
  <div class="kpis">
    ${kpi("FTD Intimation",fmt(ftdTot),`as of ${dayKey(state.asOf)}`,"c1")}
    ${kpi(P.curLabel+" Intimation",fmt(curTot),deltaSub(curTot,prevTot,P.prevLabel),"c2")}
    ${kpi(P.prevLabel,fmt(prevTot),P.scope,"c6")}
    ${kpi("Intimation Target",fmt(intimTgt),intimTgt?pct(curTot/intimTgt)+" achieved (Hub Σ)":"Hub col K","c7")}
    ${kpi("Cancelled / Rate",`${fmt(cancel)} · ${pct(cancel/(curTot||1))}`,"of "+P.curLabel,"c3")}
  </div>
  <div class="kpis" style="margin-top:12px">
    ${kpi("Active / Overall Hub",`${activeHub} / ${overallHub}`,`hubs ≥ ${aN} intim`,"c4")}
    ${kpi("Active / Overall RO",`${activeRO} / ${overallRO}`,`ROs ≥ ${aN} intim`,"c5")}
    ${kpi("Grown / Degrown Hub",`${gHub} / ${dHub}`,"vs "+P.prevLabel,"c8")}
    ${kpi("Grown / Degrown RO",`${gRO} / ${dRO}`,"vs "+P.prevLabel,"c2")}
  </div>

  <div class="sectionhead t2"><span class="eyebrow">Hub movement</span><h2>Top 10 grown & degrown hubs</h2><div class="rule"></div></div>
  <div class="grid g2">${card("Top 10 grown hubs",moveTableHub([...hubMove].sort((a,b)=>b.d-a.d).slice(0,10)))}${card("Top 10 degrown hubs",moveTableHub([...hubMove].sort((a,b)=>a.d-b.d).slice(0,10)))}</div>
  <div class="sectionhead t3"><span class="eyebrow">RO movement</span><h2>Top 10 grown & degrown ROs (insurer-wise)</h2><div class="rule"></div></div>
  <div class="grid g2">${card("Top 10 grown ROs",moveTableRO([...roMove].sort((a,b)=>b.d-a.d).slice(0,10)))}${card("Top 10 degrown ROs",moveTableRO([...roMove].sort((a,b)=>a.d-b.d).slice(0,10)))}</div>

  <div class="sectionhead"><span class="eyebrow">Mix</span><h2>Insurer · segment · vehicle type · trend</h2><div class="rule"></div></div>
  <div class="grid g3">${card("Insurer-wise",cv("i_insurer"))}${card("Segment-wise",cv("i_segment"))}${card("Vehicle-type-wise",cv("i_vtype"))}</div>
  <div class="grid g1"><div class="card tall"><h3><span class="dot"></span>Daily trend</h3>${cv("i_trend")}</div></div>
  <div class="grid" style="margin-top:14px">${card("Classification-wise — FTD / "+P.curLabel+" / "+P.prevLabel+" / "+p3h.join(" / "),
    table(["Classification","FTD",P.curLabel,P.prevLabel,...p3h],clsRows.map(x=>`<tr><td>${x.cl}</td><td class="num">${x.ftd}</td><td class="num">${x.cur}</td><td class="num">${x.prev}</td><td class="num">${x.m0}</td><td class="num">${x.m1}</td><td class="num">${x.m2}</td></tr>`).join("")||emptyRow(4+p3h.length)),"spanfull")}</div>

  <div class="sectionhead t4"><span class="eyebrow">Vehicles</span><h2>Top makes & models</h2><div class="rule"></div></div>
  <div class="grid g2"><div class="card tall"><h3><span class="dot"></span>Top makes ${topNctl()}</h3>${cv("i_make")}</div><div class="card tall"><h3><span class="dot"></span>Top models</h3>${cv("i_model")}</div></div>`;

  mkChart("i_insurer",barCfg(byInsurer.map(x=>x[0]),byInsurer.map(x=>x[1]),true,PAL,true));
  mkChart("i_segment",doughnutCfg(["Retail","PB","Tie-up"],["Retail","PB","Tie-up"].map(s=>segMix.get(s)||0),SEGC));
  mkChart("i_vtype",doughnutCfg([...vMix.keys()],[...vMix.values()],PAL));
  mkChart("i_trend",lineCfg(trL,[{label:"Intimation",data:trD,color:PAL[0]}],true));
  mkChart("i_make",barCfg(byMake.map(x=>x[0]),byMake.map(x=>x[1]),true,PAL,true));
  mkChart("i_model",barCfg(byModel.map(x=>x[0]),byModel.map(x=>x[1]),true,PAL,true));
  wireTopN(renderIntimation);
}

/* ===== TAB 2 — SUBMISSION ===== */
function mmStats(rows,key,n){const g=groupBy(rows,r=>r[key]);
  return [...g.entries()].map(([k,arr])=>({k,n:arr.length,sub:avg(arr.map(r=>r.subTAT)),vro:avg(arr.map(r=>r.vro)),setl:avg(arr.map(r=>r.settle)),ratio:avg(arr.map(r=>r.setRatio))})).sort((a,b)=>b.n-a.n).slice(0,n);}
function renderSubmission(){
  const P=computePeriod(), all=univ("aZone");
  const sub=all.filter(r=>r.finalD), cur=sub.filter(r=>P.inCur(r.finalD)), prev=sub.filter(r=>P.inPrev(r.finalD)), ftd=sub.filter(r=>P.isFTD(r.finalD));
  const intimCur=all.filter(r=>P.inCur(r.created)).length;
  const T={sub:avg(cur.map(r=>r.subTAT)),vro:avg(cur.map(r=>r.vro)),comp:avg(cur.map(r=>r.comp)),link:avg(cur.map(r=>r.link)),afsr:avg(cur.map(r=>r.allocFSR)),ifsr:avg(cur.map(r=>r.invFSR))};
  const avgSetl=cur.length?cur.reduce((s,r)=>s+r.settle,0)/cur.length:null, setRatio=avg(cur.map(r=>r.setRatio));
  const subRatio=intimCur?cur.length/intimCur:null;
  // filters TL + zone for assessor grouping
  const tlOpts=[...new Set(all.map(r=>r.aTL).filter(Boolean))].sort();
  const zOpts=[...new Set(all.map(r=>r.aZone).filter(Boolean))].sort();
  const af=state.subAFilter;
  const aRows=cur.filter(r=>(!af.tl.length||af.tl.includes(r.aTL))&&(!af.zone.length||af.zone.includes(r.aZone)));
  const assessors=[...new Set(aRows.map(r=>r.assessor).filter(Boolean))];
  const aDetail=assessors.map(a=>{const g=aRows.filter(r=>r.assessor===a);const ga=all.filter(r=>r.assessor===a);
    return {a,tl:g[0].aTL,zone:g[0].aZone,ftd:ga.filter(r=>P.isFTD(r.finalD)).length,mtd:g.length,lmtd:ga.filter(r=>r.finalD&&P.inPrev(r.finalD)).length,
      sub:avg(g.map(r=>r.subTAT)),setl:avg(g.map(r=>r.settle)),vro:avg(g.map(r=>r.vro)),afsr:avg(g.map(r=>r.allocFSR)),ifsr:avg(g.map(r=>r.invFSR))};}).sort((a,b)=>b.mtd-a.mtd);
  const byInsurer=topN(tally(cur,r=>r.insurer),12),bySeg=tally(cur,r=>r.segment),byVtype=tally(cur,r=>r.vtype);
  const wise=(fn,label)=>{const g=groupBy(cur,fn);const rs=[...g.entries()].map(([k,arr])=>({k,n:arr.length,sub:avg(arr.map(r=>r.subTAT)),vro:avg(arr.map(r=>r.vro)),comp:avg(arr.map(r=>r.comp)),setl:avg(arr.map(r=>r.settle))})).sort((a,b)=>b.n-a.n);
    return table([label,"Subs","Sub TAT(d)","VRO TAT","Comp TAT","Avg Settle"],rs.map(x=>`<tr><td>${x.k}</td><td class="num">${x.n}</td><td class="num">${fmt1(x.sub)}</td><td class="num">${minsToHrs(x.vro)}</td><td class="num">${minsToHrs(x.comp)}</td><td class="num">${money(x.setl)}</td></tr>`).join("")||emptyRow(6));};
  const byMakeArr=mmStats(cur,"make",topNPref);
  let trL,trD; if(P.trendBy==="day"){trL=P.trend.map(d=>{const dt=new Date(state.asOf.getFullYear(),state.asOf.getMonth(),d);return d+" "+DOW[dt.getDay()];});const dm=new Map();cur.forEach(r=>dm.set(r.finalD.getDate(),(dm.get(r.finalD.getDate())||0)+1));trD=P.trend.map(d=>dm.get(d)||0);}
  else{trL=P.trend.map(mLabel);trD=P.trend.map(m=>sub.filter(r=>inMonth(r.finalD,m)).length);}

  $("#page-submission").innerHTML=`
  <div class="kpis">
    ${kpi("FTD Submission",fmt(ftd.length),`as of ${dayKey(state.asOf)}`,"c1")}
    ${kpi(P.curLabel+" Submission",fmt(cur.length),deltaSub(cur.length,prev.length,P.prevLabel),"c2")}
    ${kpi("Submission Ratio",pct(subRatio),`${fmt(cur.length)} / ${fmt(intimCur)} intim`,"c6")}
    ${kpi("Avg Sub TAT",fmt1(T.sub)+" d","created → final report","c4")}
    ${kpi("Avg Claim Settlement",money(avgSetl),`ratio ${pct(setRatio)}`,"c5")}
    ${kpi("Link TAT",minsToHrs(T.link),"created → inspection","c3")}
  </div>
  <div class="kpis" style="margin-top:12px">
    ${kpi("Avg Survey Completion TAT",minsToHrs(T.comp),minsToDays(T.comp)+" wd","c2")}
    ${kpi("Avg VRO TAT",minsToHrs(T.vro),minsToDays(T.vro)+" wd","c1")}
    ${kpi("Allocation → FSR TAT",fmt1(T.afsr)+" d","surveyor alloc → FSR","c4")}
    ${kpi("Invoice → FSR TAT",fmt1(T.ifsr)+" d","invoice → FSR","c3")}
  </div>

  <div class="sectionhead t2"><span class="eyebrow">Assessor</span><h2>Assessor-wise submission & TAT</h2><div class="rule"></div></div>
  <div class="filterbar" style="position:static;margin:0 0 12px;top:auto">
    <div id="sa_tl_holder"></div>
    <div id="sa_zone_holder"></div>
    <div class="scope">${fmt(aRows.length)} submissions in view</div>
  </div>
  <div class="card">${table(["Assessor","TL","Zone","FTD",P.curLabel,P.prevLabel,"Sub TAT(d)","Avg Settle","VRO TAT","Alloc→FSR","Inv→FSR"],
    aDetail.map(x=>`<tr><td>${x.a}</td><td>${x.tl}</td><td>${x.zone}</td><td class="num">${x.ftd}</td><td class="num">${x.mtd}</td><td class="num">${x.lmtd}</td><td class="num">${fmt1(x.sub)}</td><td class="num">${money(x.setl)}</td><td class="num">${minsToHrs(x.vro)}</td><td class="num">${fmt1(x.afsr)}d</td><td class="num">${fmt1(x.ifsr)}d</td></tr>`).join("")||emptyRow(11),{x:true})}</div>

  <div class="sectionhead t3"><span class="eyebrow">Portfolio</span><h2>Insurer · segment · product · trend</h2><div class="rule"></div></div>
  <div class="grid g3">${card("Insurer-wise submission",cv("s_insurer"))}${card("Segment-wise submission",cv("s_segment"))}${card("Vehicle-type-wise submission",cv("s_vtype"))}</div>
  <div class="grid g1"><div class="card tall"><h3><span class="dot"></span>Daily submission trend</h3>${cv("s_trend")}</div></div>
  <div class="grid" style="margin-top:14px">${card("Product-wise detail",wise(r=>r.product,"Product"),"spanfull")}</div>

  <div class="sectionhead t4"><span class="eyebrow">Vehicles</span><h2>Make & model — TAT, settlement, ratio</h2><div class="rule"></div></div>
  <div class="grid g2">
    <div class="card"><h3><span class="dot"></span>Make-wise ${topNctl()}</h3>${table(["Make","Subs","Avg TAT(d)","VRO TAT","Avg Settle","Settle Ratio"],byMakeArr.map(x=>`<tr><td>${x.k}</td><td class="num">${x.n}</td><td class="num">${fmt1(x.sub)}</td><td class="num">${minsToHrs(x.vro)}</td><td class="num">${money(x.setl)}</td><td class="num">${pct(x.ratio)}</td></tr>`).join("")||emptyRow(6))}</div>
    ${card("Model-wise detail",(()=>{const a=mmStats(cur,"model",topNPref);return table(["Model","Subs","Avg TAT(d)","Avg Settle","Settle Ratio"],a.map(x=>`<tr><td>${x.k}</td><td class="num">${x.n}</td><td class="num">${fmt1(x.sub)}</td><td class="num">${money(x.setl)}</td><td class="num">${pct(x.ratio)}</td></tr>`).join("")||emptyRow(5));})())}
  </div>`;

  mkChart("s_insurer",barCfg(byInsurer.map(x=>x[0]),byInsurer.map(x=>x[1]),true,PAL,true));
  mkChart("s_segment",doughnutCfg(["Retail","PB","Tie-up"],["Retail","PB","Tie-up"].map(s=>bySeg.get(s)||0),SEGC));

  const bucket=aging==null?"—":aging<=5?"0-5 Days":aging<=15?"6-15 Days":"Above 15 Days";
  const thr=r.segment==="Tie-up"?15:20; const sla=(aging!=null&&aging>thr)?"Above SLA":"Below SLA";
  return {...r,aging,elapsed,bucket,sla};});}

  <div class="grid g4">${card("Aging buckets",cv("o_bucket"))}${card("Segment-wise OS",cv("o_segment"))}${card("Vehicle-type OS",cv("o_vtype"))}${card("Insurer-wise OS",cv("o_insurer"))}</div>

  <div class="grid g2">
    <div class="card"><h3><span class="dot"></span>Make-wise OS ${topNctl()}</h3>${table(["Make","OS","Avg Aging"],osMakeAge(os,"make",topNPref).map(x=>`<tr><td>${x.k}</td><td class="num">${x.n}</td><td class="num">${fmt1(x.age)} d</td></tr>`).join("")||emptyRow(3))}</div>

      if(P.isFTD(r.created))ftd++; if(P.inCur(r.created))mtd++; if(P.inPrev(r.created))lmtd++;
      if(P.inCur(r.inspDepD)){linkShared++;linkTATs.push(r.link);compTATs.push(r.comp);}
      if(P.inCur(r.inspCompD))surveyCompleted++;}
    const otherPending=Math.max(0,outstanding-(surveyPending+assignPending));
    const t=(meta.target!=null&&meta.target)||DB.targets.CCE[c]||0;
    out.push({c,zone:meta.zone||(mine[0]&&mine[0].zone)||"",tl:meta.tl||"",t,active:(mtd>0||linkShared>0||surveyCompleted>0),
      ftd,mtd,lmtd,surveyPending,assignPending,otherPending,outstanding,linkShared,surveyCompleted,linkTAT:avg(linkTATs),compTAT:avg(compTATs)});});

/* ===== TAB 9 — PERFORMANCE REPORT (dynamic Insurer -> RO -> Hub) ===== */
function perfBucket(days){return days==null?"—":days<=5?"0-5 Days":days<=15?"6-15 Days":"Above 15 Days";}
function perfScopeRows(){const f=state.perfFilter;
  return DB.rows.filter(r=>{if(f.insurer.length&&!f.insurer.includes(r.insurer))return false;if(f.ro.length&&!f.ro.includes(r.roName))return false;if(f.hub.length&&!f.hub.includes(r.branch))return false;return true;});}
function renderPerf(){
  const f=state.perfFilter;
  const insurerNames=[...new Set(DB.rows.map(r=>r.insurer).filter(Boolean))].sort();
  const roNames=[...new Set(DB.rows.filter(r=>!f.insurer.length||f.insurer.includes(r.insurer)).map(r=>r.roName).filter(Boolean))].sort();
  f.ro=f.ro.filter(v=>roNames.includes(v));
  const hubNames=[...new Set(DB.rows.filter(r=>(!f.insurer.length||f.insurer.includes(r.insurer))&&(!f.ro.length||f.ro.includes(r.roName))).map(r=>r.branch).filter(Boolean))].sort();
  f.hub=f.hub.filter(v=>hubNames.includes(v));

  const scoped=perfScopeRows();
  const P=computePeriod();
  const vtypes=["2W","4W","CV"];
  const segments=["Retail","PB","Tie-up"];

  // ----- Intimation FTD / MTD / LMTD -----
  const intimFTD=scoped.filter(r=>r.created&&P.isFTD(r.created)).length;
  const intimMTD=scoped.filter(r=>r.created&&P.inCur(r.created)).length;
  const intimLMTD=scoped.filter(r=>r.created&&P.inPrev(r.created)).length;

  // ----- Submission FTD / MTD / LMTD -----
  const subFTD=scoped.filter(r=>r.finalD&&P.isFTD(r.finalD)).length;
  const subMTD=scoped.filter(r=>r.finalD&&P.inCur(r.finalD)).length;
  const subLMTD=scoped.filter(r=>r.finalD&&P.inPrev(r.finalD)).length;

  // ----- Outstanding (current snapshot) -----
  const osRows=scoped.filter(r=>r.status==="Outstanding").map(r=>{const days=r.created?Math.round((state.asOf-r.created)/86400000):null;return {...r,days,bucket:perfBucket(days)};});
  const osBuckets=["0-5 Days","6-15 Days","Above 15 Days"];
  const osByBucket=osBuckets.map(b=>osRows.filter(r=>r.bucket===b).length);
  const avgAging=avg(osRows.map(r=>r.days));

  // ----- Avg Settlement — this month's completed (submitted) cases -----
  const subRowsMTD=scoped.filter(r=>r.finalD&&P.inCur(r.finalD));
  const avgSettle=avg(subRowsMTD.map(r=>r.settle));
  const avgSubTAT=avg(subRowsMTD.map(r=>r.subTAT));

  // ----- Intimation MTD — vehicle-type wise (2W/4W/CV) & segment wise -----
  const intimRowsMTD=scoped.filter(r=>r.created&&P.inCur(r.created));
  const intimByVtype=vtypes.map(v=>intimRowsMTD.filter(r=>r.vtype===v).length);
  const intimBySeg=segments.map(s=>intimRowsMTD.filter(r=>r.segment===s).length);

  // ----- Submission MTD — vehicle-type wise & segment wise -----
  const subByVtype=vtypes.map(v=>subRowsMTD.filter(r=>r.vtype===v).length);
  const subBySeg=segments.map(s=>subRowsMTD.filter(r=>r.segment===s).length);

  // ----- Outstanding snapshot — vehicle-type wise & segment wise -----
  const osByVtype=vtypes.map(v=>osRows.filter(r=>r.vtype===v).length);
  const osBySeg=segments.map(s=>osRows.filter(r=>r.segment===s).length);

  const scopeLabel=f.hub.length?(f.hub.length===1?f.hub[0]:f.hub.length+" hubs"):(f.ro.length?(f.ro.length===1?f.ro[0]+" (all hubs)":f.ro.length+" ROs (all hubs)"):(f.insurer.length?(f.insurer.length===1?f.insurer[0]+" (all ROs)":f.insurer.length+" insurers (all ROs)"):"All Insurers, ROs & Hubs"));

  // ===== New Summary — dynamic 6-month / 1-year window =====
  const rangeN=state.perfRange||6;
  const curMK=monKey(state.asOf);
  const monthKeys=[]; for(let i=rangeN-1;i>=0;i--)monthKeys.push(curMK-i);
  const monthDates=monthKeys.map(mk=>new Date(Math.floor(mk/12),mk%12,1));
  const nsLabels=monthDates.map(mLabel);
  const nsByMonth=monthDates.map(md=>{
    const rows=scoped.filter(r=>r.created&&monKey(r.created)===monKey(md));
    const reported=rows.length;
    const cancelled=rows.filter(r=>r.status==="Case Cancelled").length;
    const submitted=rows.filter(r=>r.finalD).length; // has a final report date at all
    const reportSubmitted=rows.filter(r=>r.status==="Report Submitted").length;
    const outstanding=rows.filter(r=>r.status==="Outstanding").length;
    return {label:mLabel(md),reported,submitted,cancelled,reportSubmitted,outstanding,subRatio:reported?reportSubmitted/reported:null};
  });
  const nsTotR=nsByMonth.reduce((s,m)=>s+m.reported,0), nsTotS=nsByMonth.reduce((s,m)=>s+m.submitted,0),
        nsTotC=nsByMonth.reduce((s,m)=>s+m.cancelled,0), nsTotRS=nsByMonth.reduce((s,m)=>s+m.reportSubmitted,0),
        nsTotOS=nsByMonth.reduce((s,m)=>s+m.outstanding,0), nsSubPct=nsTotR?nsTotRS/nsTotR:null;

  // window rows for product-wise / claim-size / RO overall blocks (all rows created within the window)
  const winStart=monthDates[0], winEnd=new Date(monthDates[monthDates.length-1].getFullYear(),monthDates[monthDates.length-1].getMonth()+1,0,23,59,59);
  const winRows=scoped.filter(r=>r.created&&r.created>=winStart&&r.created<=winEnd);
  const nsVtypeRows=v=>winRows.filter(r=>r.vtype===v);
  const nsProdWise=vtypes.map(v=>{const rs=nsVtypeRows(v);const reported=rs.length,submittedRows=rs.filter(r=>r.finalD),submitted=submittedRows.length,
    cancelled=rs.filter(r=>r.status==="Case Cancelled").length,outstanding=rs.filter(r=>r.status==="Outstanding").length;
    return {v,reported,submitted,cancelled,outstanding,subPct:reported?submitted/reported:null,tat:avg(submittedRows.map(r=>r.subTAT)),ticket:avg(submittedRows.map(r=>r.settle))};});
  const nsOverall={reported:winRows.length,submitted:winRows.filter(r=>r.finalD).length,cancelled:winRows.filter(r=>r.status==="Case Cancelled").length,
    outstanding:winRows.filter(r=>r.status==="Outstanding").length};
  nsOverall.subPct=nsOverall.reported?nsOverall.submitted/nsOverall.reported:null;
  const nsOverallSub=winRows.filter(r=>r.finalD);
  nsOverall.tat=avg(nsOverallSub.map(r=>r.subTAT)); nsOverall.ticket=avg(nsOverallSub.map(r=>r.settle));

  // Estimation vs Settlement — month wise (uses rows with a final report, i.e. settled cases, within window)
  const nsEstByMonth=monthDates.map(md=>{
    const rows=winRows.filter(r=>r.finalD&&monKey(r.created)===monKey(md));
    const est=rows.reduce((s,r)=>s+(r.estimate||0),0), setl=rows.reduce((s,r)=>s+(r.settle||0),0);
    return {label:mLabel(md),est,setl,savings:est-setl,pct:est?(est-setl)/est:null};
  });
  const nsEstTot={est:nsEstByMonth.reduce((s,m)=>s+m.est,0),setl:nsEstByMonth.reduce((s,m)=>s+m.setl,0)};
  nsEstTot.savings=nsEstTot.est-nsEstTot.setl; nsEstTot.pct=nsEstTot.est?nsEstTot.savings/nsEstTot.est:null;

  // Estimation vs Settlement — vehicle type wise (within window)
  const nsEstByVtype=vtypes.map(v=>{const rows=nsVtypeRows(v).filter(r=>r.finalD);
    const est=rows.reduce((s,r)=>s+(r.estimate||0),0), setl=rows.reduce((s,r)=>s+(r.settle||0),0);
    return {v,est,setl,savings:est-setl,pct:est?(est-setl)/est:null};});

  $("#page-perf").innerHTML=`

    <div id="pf_insurer_holder"></div>

  </div>

  <div class="sectionhead"><span class="eyebrow">Intimation</span><h2>Intimation — FTD / ${P.curLabel} / ${P.prevLabel}</h2><div class="rule"></div></div>
  <div class="kpis">
    ${kpi("Intimation FTD",fmt(intimFTD),`as of ${dayKey(state.asOf)}`,"c1")}

const INDIA_GEOJSON_URL="https://cdn.jsdelivr.net/gh/udit-001/india-maps-data@ef25ebc/geojson/india.geojson";
const DISTRICT_GEO_CACHE={};
function stateSlug(name){
  const overrides={"andaman and nicobar islands":"andaman-and-nicobar-islands","dadra and nagar haveli and daman and diu":"dnh-and-dd","jammu and kashmir":"jammu-and-kashmir"};
  const n=normState(name);
  if(overrides[n])return overrides[n];
  return n.replace(/&/g,"and").replace(/[^a-z0-9\s-]/g,"").trim().replace(/\s+/g,"-");
}
function districtGeoUrl(stateName){return `https://cdn.jsdelivr.net/gh/udit-001/india-maps-data@ef25ebc/geojson/states/${stateSlug(stateName)}.geojson`;}
function loadDistrictGeo(stateName){
  const slug=stateSlug(stateName);
  if(DISTRICT_GEO_CACHE[slug])return DISTRICT_GEO_CACHE[slug];
  const p=fetch(districtGeoUrl(stateName)).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}).catch(err=>{delete DISTRICT_GEO_CACHE[slug];throw err;});
  DISTRICT_GEO_CACHE[slug]=p; return p;
}
function geoDistrictName(feature){
  const p=feature.properties||{};
  // try common known keys first (fast path)
  const known=p.district||p.DISTRICT||p.District||p.dtname||p.Dist_Name||p.dt_name||p.NAME_2||p.name||p.NAME||p.Name||p.name_2;
  if(known)return String(known);
  // fallback: scan every property for the first non-empty string value that looks like a place name
  // (skip ID/code-like keys and very short/numeric-looking values)
  for(const k in p){
    const v=p[k];
    if(typeof v!=="string"||!v.trim())continue;
    if(/^(id|code|cen|st_|iso|type|engtype|varname|nl_name|gid)/i.test(k))continue;
    if(/^\d+$/.test(v.trim()))continue;
    return v.trim();
  }
  return "";
}
function normCity(s){return s?String(s).trim().toLowerCase().replace(/\s+/g," "):"";}
let INDIA_GEO=null, INDIA_GEO_LOADING=null;
function loadIndiaGeo(){
  if(INDIA_GEO)return Promise.resolve(INDIA_GEO);
  if(INDIA_GEO_LOADING)return INDIA_GEO_LOADING;
  INDIA_GEO_LOADING=fetch(INDIA_GEOJSON_URL).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(j=>{INDIA_GEO=j;return j;})
    .catch(err=>{INDIA_GEO_LOADING=null;throw err;});
  return INDIA_GEO_LOADING;
}
// normalize state name spellings between our data and the geojson's st_nm property
const STATE_ALIASES={
  "orissa":"odisha","pondicherry":"puducherry","nct of delhi":"delhi","new delhi":"delhi",
  "uttaranchal":"uttarakhand","jammu & kashmir":"jammu and kashmir","jammu and kashmir":"jammu and kashmir",
  "dadra and nagar haveli":"dadra and nagar haveli and daman and diu","daman and diu":"dadra and nagar haveli and daman and diu",
  "telangana":"telangana","andaman & nicobar islands":"andaman and nicobar islands","a & n islands":"andaman and nicobar islands"
};
function normState(s){if(!s)return"";let n=String(s).trim().toLowerCase().replace(/\s+/g," ");return STATE_ALIASES[n]||n;}
function geoStateName(feature){const p=feature.properties||{};return p.st_nm||p.STNAME||p.NAME_1||p.name||p.ST_NM||"";}

function densityMonthOptions(){ // all months present in DB (created dates), formatted
  return (DB.months||[]).map(mk=>({mk,label:mLabel(new Date(Math.floor(mk/12),mk%12,1))}));
}
function densityCountsForMonth(mk,filt,days){
  const rows=DB.rows.filter(r=>{
    if(!r.created)return false; if(monKey(r.created)!==mk)return false;
    if(filt.insurer.length&&!filt.insurer.includes(r.insurer))return false;
    if(filt.segment.length&&!filt.segment.includes(r.segment))return false;
    if(filt.vtype.length&&!filt.vtype.includes(r.vtype))return false;
    if(days&&days.length&&!days.includes(r.created.getDate()))return false;
    return true;});
  const m=new Map();
  rows.forEach(r=>{const k=normState(r.state);if(!k)return;m.set(k,(m.get(k)||0)+1);});
  return m;
}
function districtCountsForState(stateName,mk,filt,days){
  const target=normState(stateName);
  const rows=DB.rows.filter(r=>{
    if(!r.created)return false; if(monKey(r.created)!==mk)return false;
    if(normState(r.state)!==target)return false;
    if(filt.insurer.length&&!filt.insurer.includes(r.insurer))return false;
    if(filt.segment.length&&!filt.segment.includes(r.segment))return false;
    if(filt.vtype.length&&!filt.vtype.includes(r.vtype))return false;
    if(days&&days.length&&!days.includes(r.created.getDate()))return false;
    return true;});
  const m=new Map(); const unmapped=[];
  rows.forEach(r=>{const k=normCity(r.city);if(!k){unmapped.push(r);return;}m.set(k,(m.get(k)||0)+1);});
  return {counts:m,total:rows.length,unmappedCount:unmapped.length};
}
function daysInMonthKey(mk){const y=Math.floor(mk/12),m=mk%12;return new Date(y,m+1,0).getDate();}
const INSURER_COLORS={
  "New India":"#1F4EAA","United":"#4FC3F7","United India":"#4FC3F7","National":"#26A69A","Oriental":"#F57C00"
};
const DENSITY_DEFAULT_COLOR="#1CC3E8";
function hexToRgb(hex){const h=hex.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function densityColor(v,max,baseHex){
  if(!v||!max)return "#eef1fa";
  const t=Math.min(1,v/max); const lo=[235,238,250],hi=hexToRgb(baseHex||DENSITY_DEFAULT_COLOR);
  const c=lo.map((l,i)=>Math.round(l+(hi[i]-l)*t));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
function buildMapSVG(geo,counts,containerId,tipId,baseHex,mk){
  // d3-geo: mercator projection fit to a fixed viewBox sized for India's aspect ratio
  const width=560,height=520;
  const projection=d3.geoMercator().fitSize([width-16,height-16],geo);
  const path=d3.geoPath(projection);
  const max=Math.max(1,...[...counts.values()]);
  let paths="";
  geo.features.forEach((f,i)=>{
    const name=normState(geoStateName(f));
    const v=counts.get(name)||0;
    const d=path(f);
    if(!d)return;
    paths+=`<path class="mapstate" data-state="${geoStateName(f).replace(/"/g,'')}" data-value="${v}" data-mk="${mk}" d="${d}" fill="${densityColor(v,max,baseHex)}" transform="translate(8,8)"></path>`;
  });
  return {svg:`<svg viewBox="0 0 ${width} ${height}">${paths}</svg>`,max};
}
function wireMapTooltip(wrapEl,tipEl){
  wrapEl.querySelectorAll(".mapstate").forEach(p=>{
    p.addEventListener("mousemove",e=>{
      const name=p.getAttribute("data-state"),val=p.getAttribute("data-value");
      tipEl.textContent=`${name}: ${fmt(+val)}`;
      const rect=wrapEl.getBoundingClientRect();
      tipEl.style.left=(e.clientX-rect.left+12)+"px"; tipEl.style.top=(e.clientY-rect.top+8)+"px";
      tipEl.style.opacity="1";
    });
    p.addEventListener("mouseleave",()=>{tipEl.style.opacity="0";});
    p.addEventListener("click",()=>{
      const name=p.getAttribute("data-state"),mk=+p.getAttribute("data-mk");
      const days=mk===state.densityM1?state.densityD1:state.densityD2;
      openDistrictModal(name,mk,days);
    });
  });
}
async function openDistrictModal(stateName,mk,days){
  const modal=$("#dmodal"),title=$("#dmodalTitle"),body=$("#dmodalBody");
  title.textContent=stateName+" — district-wise intimation";
  body.innerHTML=`<div class="mapwrap" id="dist_wrap"><div class="maptip" id="dist_tip"></div><div id="dist_holder" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--faint);min-height:340px">Loading districts…</div></div>`;
  modal.style.display="flex";
  try{
    const geo=await loadDistrictGeo(stateName);
    const f=state.densityFilter;
    const {counts,total,unmappedCount}=districtCountsForState(stateName,mk,f,days);
    if(!total){body.innerHTML=`<div class="empty"><div class="big">No intimations</div><div class="hint">No cases match the current filters for ${stateName} in ${mLabel(new Date(Math.floor(mk/12),mk%12,1))}.</div></div>`;return;}
    const max=Math.max(1,...[...counts.values()]);
    const width=620,height=460;
    const projection=d3.geoMercator().fitSize([width-16,height-16],geo);
    const path=d3.geoPath(projection);
    const countKeys=[...counts.keys()];
    console.log("[district-map] District names found in map source for "+stateName+":", geo.features.map(geoDistrictName));
    console.log("[district-map] City values found in your data for "+stateName+" (normalized):", countKeys);
    const findCount=(k)=>{
      if(counts.has(k))return counts.get(k);
      // fuzzy fallback: substring containment either direction (handles minor naming/word-order differences)
      const hit=countKeys.find(ck=>ck && k && (ck.includes(k)||k.includes(ck)));
      return hit?counts.get(hit):0;
    };
    let paths="",matchedDistricts=0,totalDistricts=0;
    geo.features.forEach(ft=>{
      const dn=geoDistrictName(ft); const k=normCity(dn); const v=findCount(k);
      const d=path(ft); if(!d)return;
      totalDistricts++; if(v>0)matchedDistricts++;
      paths+=`<path class="mapstate" data-state="${dn.replace(/"/g,'')}" data-value="${v}" d="${d}" fill="${densityColor(v,max,f.insurer.length===1?(INSURER_COLORS[f.insurer[0]]||DENSITY_DEFAULT_COLOR):DENSITY_DEFAULT_COLOR)}" transform="translate(8,8)"></path>`;
    });
    const matchWarning=matchedDistricts===0?`<div class="footnote miss" style="margin-top:6px">None of this state's districts matched a City value in your data — the City spelling in your Hub sheet may not match this map's district names exactly. Try checking the spelling for ${stateName}.</div>`:"";
    body.innerHTML=`
      <div class="mapwrap" id="dist_wrap"><div class="maptip" id="dist_tip"></div><svg viewBox="0 0 ${width} ${height}">${paths}</svg></div>
      <div class="maplegend"><span>Low</span><div class="bar"></div><span>High</span></div>
      <div class="footnote" style="margin-top:8px">${fmt(total)} total intimations in ${stateName} this view${unmappedCount?` · ${fmt(unmappedCount)} case(s) have no City value set on their Hub record and aren't shown on the district map`:""}.</div>
      ${matchWarning}`;
    wireMapTooltip($("#dist_wrap"),$("#dist_tip"));
  }catch(err){
    console.error(err);
    body.innerHTML=`<div class="empty"><div class="big">Could not load district map</div><div class="hint">${err.message}. This state may not have a district-level map available, or the connection dropped.</div></div>`;
  }
}

// Generic helper: given entities with a numeric metric, classify each vs its peer group using quartiles.
// dir="low" => lower value is better (e.g. TAT, aging); dir="high" => higher value is better (e.g. volume, % achieved)
function rankByQuartile(entities,metricFn,dir){
  const vals=entities.map(metricFn).filter(v=>v!=null&&!isNaN(v));
  if(vals.length<4)return entities.map(e=>({...e,_q:null,_flag:"insufficient"}));
  const q1=quantile(vals,.25),q3=quantile(vals,.75),med=quantile(vals,.5);
  return entities.map(e=>{const v=metricFn(e);if(v==null||isNaN(v))return {...e,_v:v,_q:null,_flag:"insufficient"};
    let flag;
    if(dir==="low"){flag=v<=q1?"good":(v>=q3?"risk":"watch");}
    else{flag=v>=q3?"good":(v<=q1?"risk":"watch");}
    return {...e,_v:v,_med:med,_q1:q1,_q3:q3,_flag:flag};});
}
function flagBadge(f){return f==="good"?'<span class="badge b-good">Top quartile</span>':f==="risk"?'<span class="badge b-risk">Bottom quartile</span>':f==="watch"?'<span class="badge b-watch">Mid-pack</span>':'<span class="badge" style="background:var(--line2);color:var(--muted)">Limited data</span>';}
function insightBlock(title,eyebrow,bullets,riskList,goodList){
  return `<div class="insight-card">
    <h4>${title}</h4>
    <ul>${bullets.map(b=>`<li>${b}</li>`).join("")}</ul>
    ${goodList&&goodList.length?`<div style="margin-top:10px"><b style="font-size:11.5px;color:#15803d">Best performing</b><ul>${goodList.map(b=>`<li>${b}</li>`).join("")}</ul></div>`:""}
    ${riskList&&riskList.length?`<div style="margin-top:10px"><b style="font-size:11.5px;color:#d8442f">Needs attention</b><ul>${riskList.map(b=>`<li>${b}</li>`).join("")}</ul></div>`:""}
  </div>`;
}
